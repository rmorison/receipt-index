services:
  db:
    image: postgres:18
    environment:
      POSTGRES_DB: receipt_index_dev
      POSTGRES_USER: main
      POSTGRES_PASSWORD: localpass
    ports:
      - "${POSTGRES_HOST_PORT:-15432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql
      - ./db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U main -d receipt_index_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

  greenmail:
    image: greenmail/standalone:2.1.2
    environment:
      GREENMAIL_OPTS: "-Dgreenmail.auth.disabled -Dgreenmail.setup.test.all -Dgreenmail.hostname=0.0.0.0"
    ports:
      - "${GREENMAIL_SMTP_PORT:-3025}:3025"
      - "${GREENMAIL_IMAP_PORT:-3143}:3143"
    healthcheck:
      # nc available locally; CI uses bash /dev/tcp (nc missing in GreenMail image)
      test: ["CMD-SHELL", "nc -z localhost 3143"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
